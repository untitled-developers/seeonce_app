name: Build APK

on:
  push:
  workflow_dispatch:

# A newer push supersedes any build still running for the same branch;
# cancelling it frees the runner instead of finishing an obsolete APK.
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build obfuscated release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: stable
          cache: false

      # The hosted runner has only 7 GB RAM, while the project's
      # gradle.properties requests an 8 GB heap + 4 GB metaspace (fine on dev
      # machines). Under that pressure the runner VM gets OOM-killed mid-build
      # ("runner has received a shutdown signal", Gradle exit code 143).
      # Properties in the Gradle user home take precedence over the project's,
      # so cap the JVMs here without touching local builds.
      - name: Constrain Gradle memory to runner size
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=768m -XX:ReservedCodeCacheSize=256m
          org.gradle.workers.max=2
          kotlin.daemon.jvmargs=-Xmx1g
          EOF

      - name: Install dependencies
        run: flutter pub get

      # --obfuscate scrambles Dart symbol names in the AOT snapshot;
      # --split-debug-info writes the symbol maps needed to de-obfuscate
      # crash stack traces (flutter symbolize). Without those maps a release
      # crash is unreadable, so they are uploaded as a separate artifact.
      #
      # arm + arm64 covers real handsets; dropping the x64 ABI (emulators)
      # cuts one of three AOT compiles, saving build time and peak memory.
      - name: Build obfuscated release APK
        run: >
          flutter build apk --release
          --obfuscate --split-debug-info=build/symbols
          --target-platform android-arm,android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: seeonce-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload de-obfuscation symbols
        uses: actions/upload-artifact@v4
        with:
          name: obfuscation-symbols
          path: build/symbols
          if-no-files-found: error
