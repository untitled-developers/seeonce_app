name: seeonce_app
description: "An image sharing app with webrtc support, two way encrypted see once features"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # WebRTC (must be in main deps, not dev)
  flutter_webrtc: ^1.4.1

  # Crypto — pure Dart RSA + AES
  pointycastle: ^3.9.1
  cryptography: ^2.7.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Background / foreground service (Android keep-alive)
  flutter_foreground_task: ^8.0.0

  # Image processing
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.2

  # Video: compression/trim + playback
  video_compress: ^3.1.2
  video_player: ^2.9.1

  # State management & navigation
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  go_router: ^14.6.3

  # QR code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  settings_ui: ^2.0.2
  no_screenshot: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: any
  json_serializable: any
  hive_generator: any

flutter:
  uses-material-design: true

  fonts:
    # Bundled color-emoji fallback (Noto COLRv1) so emoji render identically on
    # every device. Older Androids ship an emoji font that lacks newer glyphs,
    # which showed received emoji as empty boxes. Wired in as fontFamilyFallback
    # in lib/app.dart.
    - family: NotoColorEmoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji.ttf
